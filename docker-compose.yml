# Docker Compose for Claude Session Manager
# Claude 会话管理器 Docker Compose 配置
#
# Usage / 使用:
#   docker compose up -d
#
# The ~/.claude directory is mounted read-only for security.
# ~/.claude 目录以只读方式挂载，确保安全
#
# Note: ~/.claude is typically owned by root with mode 700,
# so the container runs as root to read it. The app never writes to ~/.claude.
# 注意：~/.claude 通常属主 root 且权限 700，因此容器以 root 运行以读取。
# 应用永远不会写入 ~/.claude。

services:
  csm:
    build: .
    container_name: claude-session-manager
    restart: unless-stopped
    ports:
      - "3727:3727"
    volumes:
      # Mount Claude data as read-only / 只读挂载 Claude 数据
      - ${HOME}/.claude:/root/.claude:ro
      # Persist app config (auth, trash) / 持久化应用配置
      - csm-data:/root/.claude-session-manager
    environment:
      - CSM_PORT=3727
      - CSM_HOST=0.0.0.0
      # Set a strong secret for JWT signing / 设置强 JWT 签名密钥
      - CSM_SECRET=${CSM_SECRET:-}
      # Optional: read-only mode / 可选：只读模式
      # - CSM_READ_ONLY=true

volumes:
  csm-data:
    driver: local
